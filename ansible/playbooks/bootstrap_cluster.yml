- name: Bootstrap Proxmox baseline on all nodes
  hosts: prox_nodes
  become: true
  gather_facts: true
  vars_files:
    - ../vars/bootstrap_cluster.yml

  pre_tasks:
    - name: Verify Proxmox tooling is available
      ansible.builtin.command: pveversion
      changed_when: false
      tags:
        - always

    - name: Ensure Ceph stages are only enabled together
      ansible.builtin.assert:
        that:
          - not (bootstrap_configure_cephfs | bool) or (bootstrap_configure_ceph | bool)
          - not (bootstrap_create_osds | bool) or (bootstrap_configure_ceph | bool)
        fail_msg: Enable bootstrap_configure_ceph=true before enabling CephFS or OSD creation.
      run_once: true
      tags:
        - always

  tasks:
    - name: Ensure localhost entry matches cluster notes
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.0\.1\s+'
        line: 127.0.0.1 localhost.localdomain localhost
        state: present
      tags:
        - baseline
        - hosts

    - name: Ensure cluster node hostnames resolve locally
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^{{ item.ip | regex_escape }}\s+'
        line: '{{ item.ip }} {{ item.fqdn }} {{ item.short }}'
        state: present
      loop: '{{ cluster_hosts_entries }}'
      tags:
        - baseline
        - hosts

    - name: Remove Proxmox enterprise repository
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pve-enterprise.sources
        state: absent
      tags:
        - baseline
        - repos

    - name: Remove Ceph enterprise repository
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/ceph.sources
        state: absent
      tags:
        - baseline
        - repos

    - name: Configure Debian base and security repositories
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/debian.sources
        owner: root
        group: root
        mode: '0644'
        content: |
          Types: deb
          URIs: http://deb.debian.org/debian
          Suites: {{ ansible_distribution_release }} {{ ansible_distribution_release }}-updates
          Components: main contrib non-free non-free-firmware
          Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

          Types: deb
          URIs: http://security.debian.org/debian-security
          Suites: {{ ansible_distribution_release }}-security
          Components: main contrib non-free non-free-firmware
          Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
      tags:
        - baseline
        - repos

    - name: Remove legacy Debian repository entries from /etc/apt/sources.list
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: '^deb(\s+\[[^\]]+\])?\s+https?://(deb|security)\.debian\.org/'
        state: absent
        create: true
      tags:
        - baseline
        - repos

    - name: Remove legacy Proxmox repository entries from /etc/apt/sources.list
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: '^deb(\s+\[[^\]]+\])?\s+http://download\.proxmox\.com/debian/pve\s+'
        state: absent
      tags:
        - baseline
        - repos

    - name: Remove legacy Proxmox repository list files
      ansible.builtin.file:
        path: '{{ item }}'
        state: absent
      loop:
        - /etc/apt/sources.list.d/pve-install-repo.list
        - /etc/apt/sources.list.d/pve-no-subscription.list
      tags:
        - baseline
        - repos

    - name: Configure Proxmox no-subscription repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-no-subscription.sources
        owner: root
        group: root
        mode: '0644'
        content: |
          Types: deb
          URIs: http://download.proxmox.com/debian/pve
          Suites: {{ ansible_distribution_release }}
          Components: pve-no-subscription
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
      tags:
        - baseline
        - repos

    - name: Refresh apt metadata and apply dist-upgrade
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        upgrade: dist
      tags:
        - baseline
        - update

    - name: Install baseline packages required by later stages
      ansible.builtin.apt:
        name: '{{ baseline_packages }}'
        state: present
      tags:
        - baseline
        - packages

- name: Create or join the Proxmox cluster
  hosts: prox_nodes
  gather_facts: false
  vars_files:
    - ../vars/bootstrap_cluster.yml
  vars:
    proxmox_api_primary_host: '{{ hostvars[proxmox_cluster_primary].ansible_host | default(proxmox_cluster_primary) }}'
  module_defaults:
    group/community.proxmox.proxmox:
      api_user: '{{ lookup("ansible.builtin.env", "PROXMOX_USER") | default("root@pam", true) }}'
      api_password: '{{ lookup("ansible.builtin.env", "PROXMOX_PASSWORD") | default(omit, true) }}'
      api_token_id: '{{ lookup("ansible.builtin.env", "PROXMOX_TOKEN_ID") | default(omit, true) }}'
      api_token_secret: '{{ lookup("ansible.builtin.env", "PROXMOX_TOKEN_SECRET") | default(omit, true) }}'
      validate_certs: '{{ (lookup("ansible.builtin.env", "PROXMOX_VALIDATE_CERTS") | default("false", true)) | bool }}'

  tasks:
    - name: Require API credentials for community.proxmox
      ansible.builtin.assert:
        that:
          - (lookup('ansible.builtin.env', 'PROXMOX_PASSWORD') | length > 0) or ((lookup('ansible.builtin.env', 'PROXMOX_TOKEN_ID') | length > 0) and (lookup('ansible.builtin.env', 'PROXMOX_TOKEN_SECRET') | length > 0))
        fail_msg: Set PROXMOX_PASSWORD or PROXMOX_TOKEN_ID + PROXMOX_TOKEN_SECRET before running API-driven stages.
      when: bootstrap_configure_cluster | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cluster

    - name: Require password authentication for cluster joins
      ansible.builtin.assert:
        that:
          - lookup('ansible.builtin.env', 'PROXMOX_PASSWORD') | length > 0
        fail_msg: Cluster join via community.proxmox.proxmox_cluster requires PROXMOX_PASSWORD.
      when:
        - bootstrap_configure_cluster | bool
        - groups['prox_nodes'] | length > 1
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cluster

    - name: Create cluster on the primary node
      community.proxmox.proxmox_cluster:
        api_host: '{{ proxmox_api_primary_host }}'
        state: present
        cluster_name: '{{ proxmox_cluster_name }}'
      when: bootstrap_configure_cluster | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cluster

    - name: Gather cluster join information from the primary node
      community.proxmox.proxmox_cluster_join_info:
        api_host: '{{ proxmox_api_primary_host }}'
      register: proxmox_cluster_join_info
      when:
        - bootstrap_configure_cluster | bool
        - groups['prox_nodes'] | length > 1
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cluster

    - name: Join secondary nodes to the cluster
      community.proxmox.proxmox_cluster:
        api_host: '{{ hostvars[item].ansible_host | default(item) }}'
        state: present
        cluster_name: '{{ proxmox_cluster_name }}'
        master_ip: '{{ proxmox_api_primary_host }}'
        master_api_password: '{{ lookup("ansible.builtin.env", "PROXMOX_MASTER_PASSWORD") | default(lookup("ansible.builtin.env", "PROXMOX_PASSWORD"), true) }}'
        fingerprint: >-
          {{
            (
              proxmox_cluster_join_info.cluster_join
              | selectattr('name', 'equalto', proxmox_cluster_primary)
              | map(attribute='pve_fp')
              | list
              | first
            )
            | default((proxmox_cluster_join_info.cluster_join | map(attribute='pve_fp') | list | first), true)
          }}
      loop: "{{ groups['prox_nodes'] | difference([proxmox_cluster_primary]) }}"
      loop_control:
        label: '{{ item }}'
      when:
        - bootstrap_configure_cluster | bool
        - groups['prox_nodes'] | length > 1
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cluster

- name: Install and initialize Ceph
  hosts: prox_nodes
  become: true
  gather_facts: false
  serial: 1
  vars_files:
    - ../vars/bootstrap_cluster.yml

  tasks:
    - name: Check whether Ceph packages are already installed
      ansible.builtin.command: dpkg-query -W -f=${Status} ceph-base
      register: ceph_base_pkg
      failed_when: false
      changed_when: false
      when: bootstrap_configure_ceph | bool
      tags:
        - ceph

    - name: Install Ceph packages from the Proxmox no-subscription repository
      ansible.builtin.command: pveceph install --repository no-subscription
      when:
        - bootstrap_configure_ceph | bool
        - ceph_base_pkg.rc != 0
      tags:
        - ceph

    - name: Check whether Ceph is already initialized
      ansible.builtin.stat:
        path: /etc/pve/ceph.conf
      register: ceph_conf
      when: bootstrap_configure_ceph | bool
      tags:
        - ceph

    - name: Initialize the Ceph cluster on the primary node
      ansible.builtin.command: 'pveceph init --network {{ ceph_public_network }}'
      when:
        - bootstrap_configure_ceph | bool
        - inventory_hostname == proxmox_cluster_primary
        - not ceph_conf.stat.exists
      tags:
        - ceph

- name: Create Ceph daemons via Proxmox API
  hosts: prox_nodes
  gather_facts: false
  vars_files:
    - ../vars/bootstrap_cluster.yml
  vars:
    proxmox_api_primary_host: '{{ hostvars[proxmox_cluster_primary].ansible_host | default(proxmox_cluster_primary) }}'
  module_defaults:
    group/community.proxmox.proxmox:
      api_user: '{{ lookup("ansible.builtin.env", "PROXMOX_USER") | default("root@pam", true) }}'
      api_password: '{{ lookup("ansible.builtin.env", "PROXMOX_PASSWORD") | default(omit, true) }}'
      api_token_id: '{{ lookup("ansible.builtin.env", "PROXMOX_TOKEN_ID") | default(omit, true) }}'
      api_token_secret: '{{ lookup("ansible.builtin.env", "PROXMOX_TOKEN_SECRET") | default(omit, true) }}'
      validate_certs: '{{ (lookup("ansible.builtin.env", "PROXMOX_VALIDATE_CERTS") | default("false", true)) | bool }}'

  tasks:
    - name: Require API credentials for community.proxmox
      ansible.builtin.assert:
        that:
          - (lookup('ansible.builtin.env', 'PROXMOX_PASSWORD') | length > 0) or ((lookup('ansible.builtin.env', 'PROXMOX_TOKEN_ID') | length > 0) and (lookup('ansible.builtin.env', 'PROXMOX_TOKEN_SECRET') | length > 0))
        fail_msg: Set PROXMOX_PASSWORD or PROXMOX_TOKEN_ID + PROXMOX_TOKEN_SECRET before running API-driven stages.
      when: (bootstrap_configure_ceph | bool) or (bootstrap_configure_cephfs | bool)
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - ceph

    - name: Create Ceph monitors
      community.proxmox.proxmox_ceph_mon:
        api_host: '{{ proxmox_api_primary_host }}'
        node: '{{ item }}'
        state: present
      loop: "{{ groups['ceph_mon'] }}"
      loop_control:
        label: '{{ item }}'
      when: bootstrap_configure_ceph | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - ceph
        - ceph-mon

    - name: Create Ceph managers
      community.proxmox.proxmox_ceph_mgr:
        api_host: '{{ proxmox_api_primary_host }}'
        node: '{{ item }}'
        state: present
      loop: "{{ groups['ceph_mgr'] }}"
      loop_control:
        label: '{{ item }}'
      when: bootstrap_configure_ceph | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - ceph
        - ceph-mgr

    - name: Create Ceph metadata servers
      community.proxmox.proxmox_ceph_mds:
        api_host: '{{ proxmox_api_primary_host }}'
        node: '{{ item }}'
        state: present
      loop: "{{ groups['prox_nodes'] }}"
      loop_control:
        label: '{{ item }}'
      when: bootstrap_configure_cephfs | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs

- name: Create Ceph OSDs from explicitly defined devices
  hosts: ceph_osd
  become: true
  gather_facts: false
  serial: 1
  vars_files:
    - ../vars/bootstrap_cluster.yml

  tasks:
    - name: Require a device list before creating OSDs
      ansible.builtin.assert:
        that:
          - ceph_osd_devices is mapping
          - ceph_osd_devices.get(inventory_hostname, []) | length > 0
        fail_msg: 'Define ceph_osd_devices for {{ inventory_hostname }} before running with bootstrap_create_osds=true.'
      when: bootstrap_create_osds | bool
      tags:
        - ceph
        - ceph-osd

    - name: Create Ceph OSDs on requested devices
      ansible.builtin.command: 'pveceph osd create {{ item }}'
      loop: '{{ ceph_osd_devices.get(inventory_hostname, []) }}'
      when: bootstrap_create_osds | bool
      tags:
        - ceph
        - ceph-osd

- name: Create shared Ceph pool and CephFS storage
  hosts: prox_nodes
  become: true
  gather_facts: false
  vars_files:
    - ../vars/bootstrap_cluster.yml
  vars:
    proxmox_api_primary_host: '{{ hostvars[proxmox_cluster_primary].ansible_host | default(proxmox_cluster_primary) }}'
  module_defaults:
    group/community.proxmox.proxmox:
      api_user: '{{ lookup("ansible.builtin.env", "PROXMOX_USER") | default("root@pam", true) }}'
      api_password: '{{ lookup("ansible.builtin.env", "PROXMOX_PASSWORD") | default(omit, true) }}'
      api_token_id: '{{ lookup("ansible.builtin.env", "PROXMOX_TOKEN_ID") | default(omit, true) }}'
      api_token_secret: '{{ lookup("ansible.builtin.env", "PROXMOX_TOKEN_SECRET") | default(omit, true) }}'
      validate_certs: '{{ (lookup("ansible.builtin.env", "PROXMOX_VALIDATE_CERTS") | default("false", true)) | bool }}'

  tasks:
    - name: Gather existing Ceph pools
      ansible.builtin.command: ceph osd pool ls --format json
      register: ceph_pool_list
      changed_when: false
      when: bootstrap_configure_ceph | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - ceph
        - ceph-pool

    - name: Create the shared Ceph pool for VM and CT storage
      ansible.builtin.command: 'pveceph pool create {{ ceph_pool_name }} --add_storages'
      when:
        - bootstrap_configure_ceph | bool
        - ceph_pool_name not in (ceph_pool_list.stdout | default('[]') | from_json)
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - ceph
        - ceph-pool

    - name: Refresh pool list before creating CephFS pools
      ansible.builtin.command: ceph osd pool ls --format json
      register: ceph_pool_list_for_cephfs
      changed_when: false
      when: bootstrap_configure_cephfs | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs

    - name: Create the CephFS data pool
      ansible.builtin.command: 'ceph osd pool create {{ cephfs_data_pool_name }} {{ cephfs_data_pg_num }}'
      when:
        - bootstrap_configure_cephfs | bool
        - cephfs_data_pool_name not in (ceph_pool_list_for_cephfs.stdout | default('[]') | from_json)
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs

    - name: Create the CephFS metadata pool
      ansible.builtin.command: 'ceph osd pool create {{ cephfs_metadata_pool_name }} {{ cephfs_metadata_pg_num }}'
      when:
        - bootstrap_configure_cephfs | bool
        - cephfs_metadata_pool_name not in (ceph_pool_list_for_cephfs.stdout | default('[]') | from_json)
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs

    - name: Gather existing Ceph filesystems
      ansible.builtin.command: ceph fs ls --format json
      register: ceph_fs_list
      changed_when: false
      when: bootstrap_configure_cephfs | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs

    - name: Create the Ceph filesystem
      ansible.builtin.command: 'ceph fs new {{ cephfs_name }} {{ cephfs_metadata_pool_name }} {{ cephfs_data_pool_name }}'
      when:
        - bootstrap_configure_cephfs | bool
        - cephfs_name not in ((ceph_fs_list.stdout | default('[]') | from_json) | map(attribute='name') | list)
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs

    - name: Add CephFS as shared storage in Proxmox
      community.proxmox.proxmox_storage:
        api_host: '{{ proxmox_api_primary_host }}'
        state: present
        name: '{{ cephfs_storage_name }}'
        type: cephfs
        nodes: "{{ groups['prox_nodes'] }}"
        content: "{{ cephfs_content_types | split(',') | map('trim') | reject('equalto', '') | list }}"
        cephfs_options:
          fs_name: '{{ cephfs_name }}'
          path: '{{ cephfs_mount_path }}'
          monhost: "{{ groups['ceph_mon'] | map('extract', hostvars, 'ansible_host') | list }}"
      when: bootstrap_configure_cephfs | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs
        - storage

    - name: Ensure shared SSH directory exists on CephFS
      ansible.builtin.file:
        path: '{{ cephfs_mount_path }}/.ssh'
        state: directory
        owner: root
        group: root
        mode: '0700'
      when: bootstrap_configure_cephfs | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs
        - shared-ssh

    - name: Generate shared deployment SSH key on CephFS
      ansible.builtin.command: 'ssh-keygen -t ed25519 -f {{ shared_cluster_key_path }} -N ""'
      args:
        creates: '{{ shared_cluster_key_path }}'
      when:
        - bootstrap_configure_cephfs | bool
        - bootstrap_create_shared_cluster_key | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs
        - shared-ssh

    - name: Ensure shared private key permissions are strict
      ansible.builtin.file:
        path: '{{ shared_cluster_key_path }}'
        owner: root
        group: root
        mode: '0600'
      when:
        - bootstrap_configure_cephfs | bool
        - bootstrap_create_shared_cluster_key | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs
        - shared-ssh

    - name: Ensure shared public key is world-readable
      ansible.builtin.file:
        path: '{{ shared_cluster_key_path }}.pub'
        owner: root
        group: root
        mode: '0644'
      when:
        - bootstrap_configure_cephfs | bool
        - bootstrap_create_shared_cluster_key | bool
      run_once: true
      delegate_to: '{{ proxmox_cluster_primary }}'
      tags:
        - cephfs
        - shared-ssh
