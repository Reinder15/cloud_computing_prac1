---
- name: Derive SSH setup user for host
  ansible.builtin.set_fact:
    ssh_setup_effective_user: '{{ ssh_setup_user | default(ansible_user | default("root")) }}'

- name: Derive SSH home path and group for host
  ansible.builtin.set_fact:
    ssh_setup_home_dir: '{{ (ssh_setup_effective_user == "root") | ternary("/root", "/home/" ~ ssh_setup_effective_user) }}'
    ssh_setup_effective_group: '{{ (ssh_setup_effective_user == "root") | ternary("root", ssh_setup_effective_user) }}'

- name: Read SSH public keys from control node
  ansible.builtin.set_fact:
    ssh_setup_public_keys: >-
      {{
        lookup('ansible.builtin.file', ssh_setup_public_keys_file)
        .splitlines()
        | map('trim')
        | reject('equalto', '')
        | reject('match', '^#')
        | list
      }}

- name: Ensure at least one SSH public key is configured
  ansible.builtin.assert:
    that:
      - ssh_setup_public_keys | length > 0
    fail_msg: No usable SSH public keys found in {{ ssh_setup_public_keys_file }}.

- name: Ensure OpenSSH server is installed
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true
    lock_timeout: 600

- name: Ensure SSH service is enabled and running
  ansible.builtin.systemd:
    name: ssh
    enabled: true
    state: started

- name: Ensure SSH login user exists when non-root
  ansible.builtin.user:
    name: '{{ ssh_setup_effective_user }}'
    shell: /bin/bash
    create_home: true
    state: present
    groups: '{{ ssh_setup_sudo_group }}'
    append: true
  when:
    - ssh_setup_effective_user != 'root'
    - ssh_setup_manage_user | bool

- name: Ensure .ssh directory exists for SSH login user
  ansible.builtin.file:
    path: '{{ ssh_setup_home_dir }}/.ssh'
    state: directory
    owner: '{{ ssh_setup_effective_user }}'
    group: '{{ ssh_setup_effective_group }}'
    mode: '0700'

- name: Ensure authorized_keys file exists for SSH login user
  ansible.builtin.file:
    path: '{{ ssh_setup_home_dir }}/.ssh/authorized_keys'
    state: touch
    owner: '{{ ssh_setup_effective_user }}'
    group: '{{ ssh_setup_effective_group }}'
    mode: '0600'

- name: Ensure SSH public keys are present for SSH login user
  ansible.builtin.lineinfile:
    path: '{{ ssh_setup_home_dir }}/.ssh/authorized_keys'
    line: '{{ item }}'
    state: present
    create: true
    owner: '{{ ssh_setup_effective_user }}'
    group: '{{ ssh_setup_effective_group }}'
    mode: '0600'
  loop: '{{ ssh_setup_public_keys }}'
