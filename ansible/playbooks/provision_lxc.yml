---
- name: Provision LXC containers from deterministic rules
  hosts: prox_nodes
  become: true
  gather_facts: false
  serial: 1
  vars_files:
    - ../vars/provision_lxc.yml

  pre_tasks:
    - name: Validate generated LXC plan settings
      ansible.builtin.assert:
        that:
          - lxc_plan_count | int >= 0
          - lxc_plan_ctid_start | int >= 100
          - lxc_plan_ip_last_octet_start | int >= 2
          - (lxc_plan_ip_last_octet_start | int + lxc_plan_count | int - 1) <= 254
          - lxc_placement_nodes | length > 0
          - lxc_template_storage | length > 0
          - lxc_template_file | length > 0
          - lxc_storage | length > 0
          - lxc_bridge | length > 0
          - lxc_gateway | length > 0
          - lxc_nameserver | length > 0
          - lxc_ip_prefix | length > 0
          - lxc_ip_cidr | int > 0
          - lxc_net_rate_mb | int > 0
          - lxc_ssh_public_keys_path | length > 0
        fail_msg: Invalid LXC plan values. Check ansible/vars/provision_lxc.yml.
      run_once: true

    - name: Validate placement nodes exist in prox_nodes inventory group
      ansible.builtin.assert:
        that:
          - item in groups['prox_nodes']
        fail_msg: Placement node {{ item }} is not present in group prox_nodes.
      loop: '{{ lxc_placement_nodes }}'
      run_once: true

  tasks:
    - name: Build generated LXC plan for this host
      ansible.builtin.set_fact:
        lxc_instances_for_host: '{{ (lxc_instances_for_host | default([])) + [instance] }}'
      vars:
        idx: '{{ item | int }}'
        ctid: '{{ (lxc_plan_ctid_start | int) + (idx | int) }}'
        ip_last_octet: '{{ (lxc_plan_ip_last_octet_start | int) + (idx | int) }}'
        target_node: '{{ lxc_placement_nodes[idx % (lxc_placement_nodes | length)] }}'
        hostname: '{{ lxc_hostname_prefix }}{{ ctid }}'
        instance:
          ctid: '{{ ctid }}'
          hostname: '{{ hostname }}'
          node: '{{ target_node }}'
          ip: '{{ lxc_ip_prefix }}.{{ ip_last_octet }}'
          bridge: '{{ lxc_bridge }}'
          gateway: '{{ lxc_gateway }}'
          nameserver: '{{ lxc_nameserver }}'
          storage: '{{ lxc_storage }}'
          memory_mb: '{{ lxc_default_memory_mb }}'
          cores: '{{ lxc_default_cores }}'
          onboot: '{{ lxc_default_onboot }}'
          rate: '{{ lxc_net_rate_mb }}'
          ansible_user: '{{ lxc_ansible_user }}'
          ansible_ssh_private_key_file: '{{ lxc_ansible_private_key_file }}'
      loop: '{{ range(0, lxc_plan_count | int) | list }}'
      when: target_node == inventory_hostname

    - name: Merge explicit LXC instances for this host
      ansible.builtin.set_fact:
        lxc_instances_for_host: '{{ (lxc_instances_for_host | default([])) + [normalized_lxc] }}'
      vars:
        normalized_lxc:
          ctid: '{{ item.ctid | int }}'
          hostname: '{{ item.hostname }}'
          node: '{{ item.node }}'
          ip: '{{ item.ip }}'
          bridge: '{{ item.bridge | default(lxc_bridge) }}'
          gateway: '{{ item.gateway | default(lxc_gateway) }}'
          nameserver: '{{ item.nameserver | default(lxc_nameserver) }}'
          storage: '{{ item.storage | default(lxc_storage) }}'
          memory_mb: '{{ item.memory_mb | default(lxc_default_memory_mb) }}'
          cores: '{{ item.cores | default(lxc_default_cores) }}'
          onboot: '{{ item.onboot | default(lxc_default_onboot) }}'
          rate: '{{ item.rate | default(lxc_net_rate_mb) }}'
          ansible_user: '{{ item.ansible_user | default(lxc_ansible_user) }}'
          ansible_ssh_private_key_file: '{{ item.ansible_ssh_private_key_file | default(lxc_ansible_private_key_file) }}'
      loop: '{{ lxc_instances_extra }}'
      when: item.node == inventory_hostname

    - name: Show planned LXC instances on this host
      ansible.builtin.debug:
        msg: '{{ lxc_instances_for_host | default([]) }}'
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Ensure SSH public key file exists for LXC login
      ansible.builtin.stat:
        path: '{{ lxc_ssh_public_keys_path }}'
      register: lxc_sshkeys_stat
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Fail when LXC SSH public key file is missing
      ansible.builtin.assert:
        that:
          - lxc_sshkeys_stat.stat.exists
        fail_msg: SSH public key file {{ lxc_ssh_public_keys_path }} was not found on {{ inventory_hostname }}.
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Refresh LXC template index
      ansible.builtin.command: pveam update
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Show available Ubuntu templates
      ansible.builtin.shell: pveam available | grep -i ubuntu
      args:
        executable: /bin/bash
      register: lxc_available_ubuntu_templates
      changed_when: false
      failed_when: false
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Download selected LXC template
      ansible.builtin.command:
        argv:
          - pveam
          - download
          - '{{ lxc_template_storage }}'
          - '{{ lxc_template_file }}'
      args:
        creates: '{{ lxc_template_cache_path }}/{{ lxc_template_file }}'
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: List templates in selected storage
      ansible.builtin.command: 'pveam list {{ lxc_template_storage }}'
      changed_when: false
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Read existing container configs
      ansible.builtin.command: 'pct config {{ item.ctid }}'
      register: lxc_config_checks
      failed_when: false
      changed_when: false
      loop: '{{ lxc_instances_for_host | default([]) }}'
      loop_control:
        label: '{{ item.ctid }}'
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Create container when missing
      ansible.builtin.command:
        argv:
          - pct
          - create
          - '{{ item.item.ctid | string }}'
          - '{{ lxc_template_storage }}:vztmpl/{{ lxc_template_file }}'
          - --hostname
          - '{{ item.item.hostname }}'
          - --memory
          - '{{ (item.item.memory_mb | int) | string }}'
          - --cores
          - '{{ (item.item.cores | int) | string }}'
          - --net0
          - 'name=eth0,bridge={{ item.item.bridge }},ip={{ item.item.ip }}/{{ lxc_ip_cidr }},gw={{ item.item.gateway }},rate={{ item.item.rate }}'
          - --nameserver
          - '{{ item.item.nameserver }}'
          - --onboot
          - '{{ ((item.item.onboot | bool) | ternary("1", "0")) }}'
          - --start
          - '1'
          - --storage
          - '{{ item.item.storage }}'
          - --ssh-public-keys
          - '{{ lxc_ssh_public_keys_path }}'
      loop: '{{ lxc_config_checks.results | default([]) }}'
      loop_control:
        label: '{{ item.item.ctid }}'
      when: item.rc != 0

    - name: Ensure container is started
      ansible.builtin.command: 'pct start {{ item.ctid }}'
      register: lxc_start_result
      failed_when: >-
        (lxc_start_result.rc != 0) and
        ('already running' not in (lxc_start_result.stderr | default('') | lower))
      changed_when: lxc_start_result.rc == 0
      loop: '{{ lxc_instances_for_host | default([]) }}'
      loop_control:
        label: '{{ item.ctid }}'
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Update apt index in container
      ansible.builtin.command: 'pct exec {{ item.ctid }} -- apt update'
      register: lxc_apt_update_result
      retries: 3
      delay: 20
      until: lxc_apt_update_result.rc == 0
      loop: '{{ lxc_instances_for_host | default([]) }}'
      loop_control:
        label: '{{ item.ctid }}'
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Upgrade packages in container
      ansible.builtin.command: 'pct exec {{ item.ctid }} -- env DEBIAN_FRONTEND=noninteractive apt upgrade -y'
      register: lxc_apt_upgrade_result
      retries: 3
      delay: 20
      until: lxc_apt_upgrade_result.rc == 0
      loop: '{{ lxc_instances_for_host | default([]) }}'
      loop_control:
        label: '{{ item.ctid }}'
      when: (lxc_instances_for_host | default([])) | length > 0

    - name: Add provisioned containers to in-memory inventory for follow-up plays
      ansible.builtin.add_host:
        name: '{{ item.hostname }}'
        groups: lxc_wordpress
        ansible_host: '{{ item.ip }}'
        ansible_user: '{{ item.ansible_user }}'
        ansible_ssh_private_key_file: '{{ item.ansible_ssh_private_key_file }}'
      loop: '{{ lxc_instances_for_host | default([]) }}'
      when: (lxc_instances_for_host | default([])) | length > 0

- name: Persist provisioned LXCs in lxc_wordpress inventory group
  hosts: localhost
  become: true
  gather_facts: false
  vars:
    lxc_inventory_path: '{{ (ansible_inventory_sources | default([]) | first) | default("/etc/ansible/hosts", true) }}'

  tasks:
    - name: Initialize persistent LXC inventory list
      ansible.builtin.set_fact:
        lxc_persistent_inventory_entries: []

    - name: Collect provisioned LXC entries from all Proxmox nodes
      ansible.builtin.set_fact:
        lxc_persistent_inventory_entries: >-
          {{
            lxc_persistent_inventory_entries +
            (hostvars[item].lxc_instances_for_host | default([]))
          }}
      loop: '{{ groups["prox_nodes"] | default([]) }}'

    - name: Keep unique LXC entries by hostname
      ansible.builtin.set_fact:
        lxc_persistent_inventory_entries: '{{ lxc_persistent_inventory_entries | unique(attribute="hostname") | list }}'

    - name: Ensure lxc_wordpress group exists in inventory file
      ansible.builtin.lineinfile:
        path: '{{ lxc_inventory_path }}'
        regexp: '^\[lxc_wordpress\]$'
        line: '[lxc_wordpress]'

    - name: Persist provisioned LXCs into lxc_wordpress inventory group
      ansible.builtin.lineinfile:
        path: '{{ lxc_inventory_path }}'
        regexp: '^{{ item.hostname | regex_escape }}\s+'
        line: '{{ item.hostname }} ansible_host={{ item.ip }} ansible_user={{ item.ansible_user }} ansible_ssh_private_key_file={{ item.ansible_ssh_private_key_file }}'
        insertafter: '^\[lxc_wordpress\]$'
      loop: '{{ lxc_persistent_inventory_entries }}'
      when: (lxc_persistent_inventory_entries | length) > 0
