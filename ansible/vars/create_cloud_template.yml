---
template_vmid: 1000
template_name: ubuntu-2404-cloudinit-template

template_image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
template_image_path: /var/lib/vz/template/qemu/noble-server-cloudimg-amd64.img
template_disk_size_gb: 30
template_disk_size: '{{ template_disk_size_gb }}G'
template_disk_size_bytes: '{{ template_disk_size_gb | int * 1024 * 1024 * 1024 }}'

template_storage: local-lvm
template_expected_disk_ref: '{{ template_storage }}:vm-{{ template_vmid }}-disk-1'
template_cloudinit_drive_ref: '{{ template_storage }}:cloudinit'
template_efidisk_ref: '{{ template_storage }}:0,pre-enrolled-keys=0'

template_ostype: l26
template_bios: ovmf
template_machine: q35
template_cpu_type: host
template_sockets: 1
template_cores: 1
template_memory_mb: 1024
template_vga: serial0
template_serial0: socket
template_bridge: vmbr0
template_tags: ubuntu-template,24.04,cloudinit

template_cloudinit_user: ubuntu
template_cloudinit_password: password
template_cloudinit_password_salt: cloudtmpl2404
template_cloudinit_upgrade: false
template_cloudinit_upgrade_value: '{{ (template_cloudinit_upgrade | bool) | ternary("1", "0") }}'
template_ipconfig0: ip=dhcp
template_sshkeys_path: /mnt/pve/cephfs/.ssh/authorized_keys
template_force_sshkeys_update: false

template_vendor_snippet_storage: local
template_vendor_snippet_name: vendor.yaml
template_vendor_snippet_path: /var/lib/vz/snippets/vendor.yaml
template_vendor_snippet_ref: '{{ template_vendor_snippet_storage }}:snippets/{{ template_vendor_snippet_name }}'

template_vendor_snippet_content: |
  #cloud-config
  package_update: true
  package_upgrade: false
  packages:
    - qemu-guest-agent
  runcmd:
    - systemctl enable --now qemu-guest-agent
