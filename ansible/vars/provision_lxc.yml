---
# LXC template download settings (pveam)
lxc_template_storage: local
lxc_template_file: ubuntu-25.04-standard_25.04-1.1_amd64.tar.zst
lxc_template_cache_path: /var/lib/vz/template/cache

# Container defaults
lxc_storage: ceph-pool
lxc_bridge: vmbr0
lxc_gateway: 10.24.38.1
lxc_nameserver: 8.8.8.8
lxc_ip_cidr: 24
lxc_default_memory_mb: 1024
lxc_default_cores: 1
lxc_default_onboot: true

# Network speed cap in MB/s (requirement: 50MB/s)
lxc_net_rate_mb: 50

# SSH access defaults for Ansible follow-up plays
lxc_ssh_public_keys_path: /mnt/pve/cephfs/.ssh/authorized_keys
lxc_ansible_user: root
lxc_ansible_private_key_file: /mnt/pve/cephfs/.ssh/id_ed25519

# Deterministic container generation rules
lxc_plan_count: 3
lxc_plan_ctid_start: 100
lxc_plan_ip_last_octet_start: 10
lxc_ip_prefix: 10.24.38
lxc_hostname_prefix: wordpress-training-

# Round robin on index
lxc_placement_nodes:
  - node1
  - node2
  - node3

# Each item must include: ctid, hostname, node, ip
# Optional: bridge, gateway, nameserver, storage, memory_mb, cores, onboot, rate, ansible_user, ansible_ssh_private_key_file
lxc_instances_extra: []
