---
# Proxmox template and VM hardware defaults
vm_template_id: 1000
vm_storage: ceph-pool
vm_bridge: vmbr0
vm_gateway: 10.24.38.1
vm_nameserver: 8.8.8.8
vm_disk_size: 30G
vm_cores: 1
vm_memory: 1024
vm_net_rate: 50

# Provisioning behavior
vm_cloudinit_upgrade: false
vm_force_reconfigure: false
vm_start_after_provision: true
vm_verify_ssh_setup: true
vm_verify_ssh_for_existing: false

# SSH key defaults (stored on shared CephFS)
vm_ssh_dir: /mnt/pve/cephfs/.ssh
vm_ssh_key_type: ed25519
vm_generate_keys: true

# Deterministic VM generation rules
# VMIDs, names, users, and IPs are generated from these values.
vm_plan_count: 3
vm_plan_vmid_start: 1001
vm_plan_ip_last_octet_start: 100
vm_ip_prefix: 10.24.38
vm_name_prefix: wp-vm-
vm_ssh_user_prefix: ubuntu-

# Round robin on index
vm_placement_nodes:
  - node1
  - node2
  - node3

# Each item must include: vmid, name, node, ip, ssh_user
# Optional: key_base, auth_keys_file
vm_instances_extra: []
