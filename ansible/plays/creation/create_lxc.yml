---
- name: Create simple LXC containers on Proxmox
  hosts: node1
  become: true
  gather_facts: false
  
  vars_files:
    - ../../vars/main.yml
    
  tasks:
    - name: Refresh template index
      command: pveam update

    - name: Download Ubuntu template if missing
      command:
        argv:
          - pveam
          - download
          - "{{ lxc_template_storage }}"
          - "{{ lxc_template_file }}"
      args:
        creates: "{{ lxc_template_cache_path }}/{{ lxc_template_file }}"

    - name: Generate client SSH keys for each container
      command:
        argv:
          - ssh-keygen
          - -t
          - ed25519
          - -f
          - "{{ ssh_dir }}/{{ item.client_user }}_id_ed25519"
          - -N
          - ""
          - -C
          - "{{ item.client_user }}@{{ item.hostname }}"
      args:
        creates: "{{ ssh_dir }}/{{ item.client_user }}_id_ed25519.pub"
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Check if container already exists
      command: "pct config {{ item.ctid }}"
      register: lxc_config_check
      failed_when: false
      changed_when: false
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Create container when missing
      command:
        argv:
          - pct
          - create
          - "{{ item.item.ctid | string }}"
          - "{{ lxc_template_storage }}:vztmpl/{{ lxc_template_file }}"
          - --hostname
          - "{{ item.item.hostname }}"
          - --memory
          - "{{ lxc_memory }}"
          - --cores
          - "{{ lxc_cores }}"
          - --storage
          - "{{ storage }}"
          - --rootfs
          - "{{ storage }}:30"
          - --net0
          - "name=eth0,bridge=vmbr0,ip={{ item.item.ip }}/24,gw={{ gateway }},rate={{ lxc_net_rate_mb }}"
          - --nameserver
          - "{{ nameserver }}"
          - --onboot
          - "1"
          - --start
          - "1"
          - --ssh-public-keys
          - "{{ ssh_dir }}/{{ item.item.client_user }}_id_ed25519.pub"
      loop: "{{ lxc_config_check.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      when: item.rc != 0

    - name: Ensure containers are started
      command: "pct start {{ item.ctid }}"
      register: lxc_start_result
      failed_when: >-
        (lxc_start_result.rc != 0) and
        ('already running' not in (lxc_start_result.stderr | default('') | lower))
      changed_when: lxc_start_result.rc == 0
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Update apt
      command: "pct exec {{ item.ctid }} -- env DEBIAN_FRONTEND=noninteractive apt update"
      register: lxc_apt_update_result
      retries: 3
      delay: 20
      until: lxc_apt_update_result.rc == 0
      changed_when: false
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Install OpenSSH server in containers
      command: "pct exec {{ item.ctid }} -- env DEBIAN_FRONTEND=noninteractive apt install -y openssh-server"
      register: lxc_ssh_install_result
      retries: 3
      delay: 20
      until: lxc_ssh_install_result.rc == 0
      changed_when: >-
        'is already the newest version' not in (lxc_ssh_install_result.stdout | default(''))
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Ensure SSH service is enabled and running in containers
      command: "pct exec {{ item.ctid }} -- systemctl enable --now ssh"
      changed_when: false
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Remove existing LXC host entries from inventory
      lineinfile:
        path: "{{ lxc_inventory_path }}"
        regexp: '^{{ item.hostname | regex_escape }}\s+'
        state: absent
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Persist LXC host entries to hosts
      lineinfile:
        path: "{{ lxc_inventory_path }}"
        insertafter: '^\[lxc_wordpress\]$'
        line: '{{ item.hostname }} ansible_host={{ item.ip }} ansible_user=ansible ansible_ssh_private_key_file={{ ansible_private_key_path }} lxc_ctid={{ item.ctid }} client_user={{ item.client_user }} client_pubkey_file={{ ssh_dir }}/{{ item.client_user }}_id_ed25519.pub'
        state: present
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Wait for SSH port on containers
      wait_for:
        host: "{{ item.ip }}"
        port: 22
        timeout: 180
        sleep: 3
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
      delegate_to: localhost

    - name: Remove stale host key entries for container IPs
      command: "ssh-keygen -R {{ item.ip }}"
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
      delegate_to: localhost
      failed_when: false
      changed_when: false

    - name: Scan container host keys
      command: "ssh-keyscan -H -T 5 {{ item.ip }}"
      register: lxc_keyscan_results
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
      delegate_to: localhost
      failed_when: false
      changed_when: false

    - name: Add to known_hosts
      known_hosts:
        path: /mnt/pve/cephfs/.ssh/known_hosts
        name: "{{ item.item.ip }}"
        key: "{{ item.stdout }}"
        state: present
      loop: "{{ lxc_keyscan_results.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      when: item.rc == 0 and (item.stdout | length > 0)
      delegate_to: localhost

    - name: Print LXC container SSH access info
      debug:
        msg: |
          Container {{ item.hostname }} is running at {{ item.ip }}
          SSH access:
            ansible_user: ansible
            ansible_host: {{ item.ip }}
            ansible_ssh_private_key_file: {{ ansible_private_key_path }}
          Client user: {{ item.client_user }}
          Client public key: {{ ssh_dir }}/{{ item.client_user }}_id_ed25519.pub
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"



      

  
