---
#
# ssh ansible@10.24.38.111 -i /mnt/pve/cephfs/.ssh/id_ed25519
# ssh client-a@10.24.38.111 -i /mnt/pve/cephfs/.ssh/wp-client-a_id_ed25519
#
- name: Clone golden template and apply per-VM identity
  hosts: node1
  become: true
  gather_facts: false
  vars_files:
    - ../../secrets
    - ../../vars/main.yml
  vars:
    default_vm_target_node: "{{ template_source_node }}"

  tasks:

    - name: Generate SSH key-pair
      command: >
        ssh-keygen -t ed25519 -N ""
        -f {{ ssh_dir }}/{{ item.name }}_id_ed25519
        -C {{ item.client_user }}@{{ item.name }}
      args:
        creates: "{{ ssh_dir }}/{{ item.name }}_id_ed25519"
      loop: "{{ vm_instances }}"

    - name: Set private key permissions
      file:
        path: "{{ ssh_dir }}/{{ item.name }}_id_ed25519"
        owner: root
        group: root
        mode: "0600"
      loop: "{{ vm_instances }}"

    - name: Set public key permissions
      file:
        path: "{{ ssh_dir }}/{{ item.name }}_id_ed25519.pub"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ vm_instances }}"

    - name: Create user data snippets
      copy:
        dest: "/mnt/pve/cephfs/snippets/{{ item.name }}-user-data.yaml"
        owner: root
        group: root
        mode: "0644"
        content: |
          #cloud-config
          users:
            - name: ansible
              groups: [sudo]
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              ssh_authorized_keys:
                - "{{ lookup('file', ansible_pubkey_path) }}"
            - name: "{{ item.client_user }}"
              groups: [sudo]
              shell: /bin/bash
              ssh_authorized_keys:
                - "{{ lookup('file', ssh_dir ~ '/' ~ item.name ~ '_id_ed25519.pub') }}"
          ssh_pwauth: false
          disable_root: true
      loop: "{{ vm_instances }}"

    - name: Clone VM from template
      community.proxmox.proxmox_kvm:
        api_user: ansible@pam
        api_token_id: ansible-token
        api_token_secret: "{{ api_key }}"
        api_host: 10.24.38.2
        validate_certs: false
        node: "{{ template_source_node }}"
        clone: "{{ template_name }}"
        vmid: "{{ template_vmid }}"
        newid: "{{ item.vmid }}"
        name: "{{ item.name }}"
        target: "{{ item.target_node | default(default_vm_target_node) }}"
        storage: "{{ storage }}"
        full: true
        state: present
      loop: "{{ vm_instances }}"
      register: clone_result

    - name: Apply cloud-init (rerun-safe)
      command: >
        qm set {{ item.vmid }}
        --cicustom user=cephfs:snippets/{{ item.name }}-user-data.yaml
        --ipconfig0 ip={{ item.ip }}/24,gw={{ gateway }}
        --nameserver "{{ nameserver }}"
      loop: "{{ vm_instances }}"

    - name: Configure net0 only for newly cloned VMs
      command: >
        qm set {{ item.vmid }}
        --net0 virtio,bridge=vmbr0,rate={{ vm_net_rate_mb }}
      loop: "{{ vm_instances }}"
      loop_control:
        index_var: vm_idx
      when: clone_result.results[vm_idx].changed

    - name: Refresh cloud-init data
      command: qm cloudinit update {{ item.vmid }}
      changed_when: false
      loop: "{{ vm_instances }}"

    - name: Start VM
      community.proxmox.proxmox_kvm:
        api_user: ansible@pam
        api_token_id: ansible-token
        api_token_secret: "{{ api_key }}"
        api_host: 10.24.38.2
        validate_certs: false
        vmid: "{{ item.vmid }}"
        node: "{{ item.target_node | default(default_vm_target_node) }}"
        state: started
      loop: "{{ vm_instances }}"
    
    - name: Add VM entries under vm_wordpress
      lineinfile:
        path: /etc/ansible/hosts
        insertafter: '^\[vm_wordpress\]$'
        line: "{{ item.name }} ansible_host={{ item.ip }} ansible_user=ansible ansible_ssh_private_key_file={{ ssh_dir }}/id_ed25519"
        state: present
      loop: "{{ vm_instances }}"

    - name: Wait for SSH port on VMs
      wait_for:
        host: "{{ item.ip }}"
        port: 22
        timeout: 180
        sleep: 3
      loop: "{{ vm_instances }}"
      loop_control:
        label: "{{ item.name }}"
      become: false

    - name: Remove stale host key
      command: "ssh-keygen -R {{ item.ip }}"
      loop: "{{ vm_instances }}"
      delegate_to: localhost
      become: false
      failed_when: false
      changed_when: false

    - name: Wait for ssh-keyscan to succeed
      command: ssh-keyscan -H {{ item.ip }}
      register: keyscan_result
      until: keyscan_result.rc == 0 and keyscan_result.stdout != ""
      retries: 10
      delay: 3
      delegate_to: localhost
      become: false
      loop: "{{ vm_instances }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Add VM host keys to known_hosts
      known_hosts:
        path: /mnt/pve/cephfs/.ssh/known_hosts
        name: "{{ item.ip }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -H ' ~ item.ip ~ ' 2>/dev/null') }}"
        state: present
      loop: "{{ vm_instances }}"
      delegate_to: localhost
      become: false
  
    - name: Ensure VMs are HA managed
      command: "ha-manager add vm:{{ item.vmid }} --state started"
      register: ha_add_result
      failed_when: >-
        (ha_add_result.rc != 0) and
        ('already' not in (((ha_add_result.stdout | default('')) ~ ' ' ~ (ha_add_result.stderr | default(''))) | lower))
      changed_when: ha_add_result.rc == 0
      loop: "{{ vm_instances }}"
      loop_control:
        label: "vm:{{ item.vmid }}"

    - name: Ensure HA node-affinity rule exists
      command: >
        ha-manager rules add node-affinity {{ ha_rule_name }}
        --resources {{ ha_resources_csv }}
        --nodes "{{ ha_nodes }}"
      vars:
        ha_resources_csv: "vm:{{ vm_instances | map(attribute='vmid') | map('string') | join(',vm:') }}"
      register: ha_rule_add_result
      failed_when: >-
        (ha_rule_add_result.rc != 0) and
        ('already' not in (((ha_rule_add_result.stdout | default('')) ~ ' ' ~ (ha_rule_add_result.stderr | default(''))) | lower))
      changed_when: ha_rule_add_result.rc == 0

    - name: Enforce HA node-affinity rule settings
      command: >
        ha-manager rules set node-affinity {{ ha_rule_name }}
        --resources {{ ha_resources_csv }}
        --nodes "{{ ha_nodes }}"
        --strict {{ 1 if ha_rule_strict else 0 }}
      vars:
        ha_resources_csv: "vm:{{ vm_instances | map(attribute='vmid') | map('string') | join(',vm:') }}"
      changed_when: false

    - name: Apply HA failback policy to VMs
      command: >
        ha-manager set vm:{{ item.vmid }}
        --state started
        --failback {{ 1 if ha_failback else 0 }}
      changed_when: false
      loop: "{{ vm_instances }}"
      loop_control:
        label: "vm:{{ item.vmid }}"

    - name: Print VM SSH access info
      debug:
        msg: >-
          VM {{ item.name }}: ip={{ item.ip }}, client_user={{ item.client_user }}, client_private_key={{ ssh_dir }}/{{ item.name }}_id_ed25519
      loop: "{{ vm_instances }}"
      loop_control:
        label: "{{ item.name }}"