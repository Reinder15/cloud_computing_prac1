- hosts: node1
  become: false
  gather_facts: false
  vars_files:
    - ../../main.yml

  tasks:

  - name: Destroy old VM if it exists
    command: qm destroy {{ template_vmid }} --purge 1
    failed_when: false
    changed_when: false

  - name: Download cloud image
    get_url:
      url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
      dest: "{{ template_image_path }}"
      mode: "0644"
      force: false

  - name: Setup cloud-init vendor
    copy:
      dest: /mnt/pve/cephfs/snippets/vendor-minimal.yaml
      mode: "0644"
      content: |
        #cloud-config
        package_update: true
        package_upgrade: false
        packages:
          - qemu-guest-agent
        write_files:
          - path: /etc/ssh/sshd_config.d/99-hardening.conf
            permissions: "0644"
            content: |
              PermitRootLogin no
              PasswordAuthentication no
        runcmd:
          - systemctl enable --now qemu-guest-agent
          - systemctl restart ssh || systemctl restart sshd
  
  - name: Create VM shell
    command: >
      qm create {{ template_vmid }}
      --name {{ template_name }}
      --memory {{ template_memory }}
      --cores {{ template_cores }}
      --net0 virtio,bridge=vmbr0
      --agent 1
      --serial0 socket
      --vga serial0

  - name: Import image disk
    command: >
      qm importdisk {{ template_vmid }} {{ template_image_path }} {{ storage }}

  - name: Attach disks and cloud-init metadata
    command: >
      qm set {{ template_vmid }}
      --scsihw virtio-scsi-pci
      --virtio0 {{ storage }}:vm-{{ template_vmid }}-disk-0
      --ide2 {{ storage }}:cloudinit
      --boot order=virtio0
      --ipconfig0 ip=dhcp
      --cicustom vendor=cephfs:snippets/vendor-minimal.yaml

  - name: Refresh cloud-init metadata
    command: qm cloudinit update {{ template_vmid }}
    changed_when: false

  - name: Convert to template
    command: qm template {{ template_vmid }}
