---
- name: Create simple LXC containers on Proxmox using proxmox_lxc
  hosts: node1
  become: true
  gather_facts: false

  vars_files:
    - ../../vars/main.yml

  tasks:
    - name: Ensure client SSH keys exist for each container
      command:
        argv:
          - ssh-keygen
          - -t
          - ed25519
          - -f
          - "{{ ssh_dir }}/{{ item.client_user }}_id_ed25519"
          - -N
          - ""
          - -C
          - "{{ item.client_user }}@{{ item.hostname }}"
      args:
        creates: "{{ ssh_dir }}/{{ item.client_user }}_id_ed25519.pub"
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Create/start LXC containers with proxmox_lxc
      community.general.proxmox_lxc:
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        api_host: "{{ proxmox_api_host }}"
        node: "{{ inventory_hostname }}"
        hostname: "{{ item.hostname }}"
        vmid: "{{ item.ctid }}"
        ostemplate: "{{ lxc_template_storage }}:vztmpl/{{ lxc_template_file }}"
        storage: "{{ storage }}"
        rootfs: "{{ storage }}:30"
        memory: "{{ lxc_memory }}"
        cores: "{{ lxc_cores }}"
        netif:
          - name: eth0
            bridge: vmbr0
            ip: "{{ item.ip }}/24"
            gw: "{{ gateway }}"
            rate: "{{ lxc_net_rate_mb }}"
        nameserver: "{{ nameserver }}"
        onboot: true
        start: true
        ssh_public_keys: "{{ lookup('file', ansible_pubkey_path) }}"
        state: started
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Wait for SSH port on containers
      wait_for:
        host: "{{ item.ip }}"
        port: 22
        timeout: 180
        sleep: 3
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
      delegate_to: localhost

    - name: Ensure ansible user exists in container
      command: "pct exec {{ item.ctid }} -- bash -c 'id ansible || useradd -m -s /bin/bash -G sudo ansible'"
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Ensure .ssh directory exists for ansible user
      command: "pct exec {{ item.ctid }} -- mkdir -p /home/ansible/.ssh"
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Set permissions on .ssh directory for ansible user
      command: >-
        pct exec {{ item.ctid }} -- bash -c 'chown ansible:ansible /home/ansible/.ssh && chmod 700 /home/ansible/.ssh'
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Copy ansible public key to authorized_keys for ansible user
      command: >-
        pct exec {{ item.ctid }} -- bash -c 'echo {{ lookup('file', ansible_pubkey_path) | trim | quote }} > /home/ansible/.ssh/authorized_keys && chown ansible:ansible /home/ansible/.ssh/authorized_keys && chmod 600 /home/ansible/.ssh/authorized_keys'
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Remove stale host key entries for container IPs
      command: "ssh-keygen -R {{ item.ip }}"
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
      delegate_to: localhost
      failed_when: false
      changed_when: false

    - name: Scan container host keys
      command: "ssh-keyscan -H -T 5 {{ item.ip }}"
      register: lxc_keyscan_results
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
      delegate_to: localhost
      failed_when: false
      changed_when: false

    - name: Add to known_hosts
      known_hosts:
        path: /mnt/pve/cephfs/.ssh/known_hosts
        name: "{{ item.item.ip }}"
        key: "{{ item.stdout }}"
        state: present
      loop: "{{ lxc_keyscan_results.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      when: item.rc == 0 and (item.stdout | length > 0)
      delegate_to: localhost

    - name: Print LXC container SSH access info
      debug:
        msg: >-
          LXC {{ item.hostname }}: ip={{ item.ip }}, client_user={{ item.client_user }}, client_private_key={{ ssh_dir }}/{{ item.client_user }}_id_ed25519
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
