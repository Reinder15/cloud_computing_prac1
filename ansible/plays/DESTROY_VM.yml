---
- name: Destroy all VMs in vm_wordpress
  hosts: node1
  gather_facts: false
  vars_files:
    - ../secrets
  vars:
    proxmox_api_host: 10.24.38.2
    proxmox_api_user: ansible@pam
    proxmox_api_token_id: ansible-token
    vm_destroy_list: 
      - wp-client-a
      - wp-client-b

  tasks:

    - name: Destroy VM by name
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ api_key | trim }}"
        api_password: ""
        validate_certs: false
        name: "{{ item }}"
        state: absent
        force: true
        purge: true
      loop: "{{ vm_destroy_list }}"
      loop_control:
        label: "{{ item }}"

    - name: Remove VM entries from inventory
      ansible.builtin.lineinfile:
        path: /etc/ansible/hosts
        regexp: "^{{ item }}\\s"
        state: absent
      loop: "{{ vm_destroy_list }}"
      loop_control:
        label: "{{ item }}"