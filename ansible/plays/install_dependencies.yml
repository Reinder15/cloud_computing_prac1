- hosts: prox_nodes
  become: true
  vars_files:
    - ../secrets
  tasks:

    - name: Update repository cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    
    - name: install proxmoxer
      apt:
        name: python3-proxmoxer
        state: latest

    - name: Install dependencies for prometheus-pve-exporter
      apt:
        name:
          - python3-pip
          - git
          - python3-venv
        state: present
        update_cache: yes

    - name: Clone prometheus-pve-exporter repo
      git:
        repo: 'https://github.com/prometheus-pve/prometheus-pve-exporter.git'
        dest: /opt/prometheus-pve-exporter
        version: main
        force: yes

    - name: Set up Python venv for exporter
      command: python3 -m venv /opt/prometheus-pve-exporter/venv
      args:
        creates: /opt/prometheus-pve-exporter/venv/bin/activate

    - name: Install exporter requirements
      pip:
        requirements: /opt/prometheus-pve-exporter/requirements.txt
        virtualenv: /opt/prometheus-pve-exporter/venv


    - name: Create pve.yml config for exporter (token-based)
      copy:
        dest: /opt/prometheus-pve-exporter/pve.yml
        owner: root
        group: root
        mode: '0600'
        content: |
          default:
            user: ansible@pam
            token_name: prompve-scraper
            token_value: "{{ api_key_prom }}"

    - name: Create systemd service for prometheus-pve-exporter (module-based)
      copy:
        dest: /etc/systemd/system/prometheus-pve-exporter.service
        content: |
          [Unit]
          Description=Prometheus PVE Exporter
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/prometheus-pve-exporter/src
          ExecStart=/opt/prometheus-pve-exporter/venv/bin/python3 -m pve_exporter --config.file=/opt/prometheus-pve-exporter/pve.yml --web.listen-address=0.0.0.0:9221
          Restart=always

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start prometheus-pve-exporter
      systemd:
        name: prometheus-pve-exporter
        enabled: yes
        state: started