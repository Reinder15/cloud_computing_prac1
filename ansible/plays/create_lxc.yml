---
- name: Create simple LXC containers on Proxmox
  hosts: node1
  become: true
  gather_facts: false

  vars:
    template_storage: local
    template_file: ubuntu-22.04-standard_22.04-1_amd64.tar.zst
    template_cache_path: /var/lib/vz/template/cache
    lxc_storage: ceph-pool
    gateway: 10.24.38.1
    nameserver: 8.8.8.8
    net_rate_mb: 50
    ssh_public_keys_path: /mnt/pve/cephfs/.ssh/authorized_keys
    ansible_private_key_path: /mnt/pve/cephfs/.ssh/id_ed25519
    ansible_pubkey_path: /mnt/pve/cephfs/.ssh/id_ed25519.pub
    lxc_inventory_path: /etc/ansible/hosts

    containers:
      - ctid: 201
        hostname: wordpress-lxc-201
        ip: 10.24.38.201
        client_user: client-a
        client_pubkey_path: /mnt/pve/cephfs/.ssh/client-201_id_ed25519.pub

      - ctid: 202
        hostname: wordpress-lxc-202
        ip: 10.24.38.202
        client_user: client-b
        client_pubkey_path: /mnt/pve/cephfs/.ssh/client-202_id_ed25519.pub

  tasks:
    - name: Refresh template index
      command: pveam update

    - name: Download Ubuntu template if missing
      command:
        argv:
          - pveam
          - download
          - "{{ template_storage }}"
          - "{{ template_file }}"
      args:
        creates: "{{ template_cache_path }}/{{ template_file }}"

    - name: Check if container already exists
      command: "pct config {{ item.ctid }}"
      register: lxc_config_check
      failed_when: false
      changed_when: false
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Create container when missing
      command:
        argv:
          - pct
          - create
          - "{{ item.item.ctid | string }}"
          - "{{ template_storage }}:vztmpl/{{ template_file }}"
          - --hostname
          - "{{ item.item.hostname }}"
          - --memory
          - "1024"
          - --cores
          - "1"
          - --storage
          - "{{ lxc_storage }}"
          - --net0
          - "name=eth0,bridge=vmbr0,ip={{ item.item.ip }}/24,gw={{ gateway }},rate={{ net_rate_mb }}"
          - --nameserver
          - "{{ nameserver }}"
          - --onboot
          - "1"
          - --start
          - "1"
          - --ssh-public-keys
          - "{{ ssh_public_keys_path }}"
      loop: "{{ lxc_config_check.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      when: item.rc != 0

    - name: Ensure containers are started
      command: "pct start {{ item.ctid }}"
      register: lxc_start_result
      failed_when: >-
        (lxc_start_result.rc != 0) and
        ('already running' not in (lxc_start_result.stderr | default('') | lower))
      changed_when: lxc_start_result.rc == 0
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Update apt
      command: "pct exec {{ item.ctid }} -- env DEBIAN_FRONTEND=noninteractive apt update"
      register: lxc_apt_update_result
      retries: 3
      delay: 20
      until: lxc_apt_update_result.rc == 0
      changed_when: false
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Install OpenSSH server in containers
      command: "pct exec {{ item.ctid }} -- env DEBIAN_FRONTEND=noninteractive apt install -y openssh-server"
      register: lxc_ssh_install_result
      retries: 3
      delay: 20
      until: lxc_ssh_install_result.rc == 0
      changed_when: >-
        'is already the newest version' not in (lxc_ssh_install_result.stdout | default(''))
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Ensure SSH service is enabled and running in containers
      command: "pct exec {{ item.ctid }} -- systemctl enable --now ssh"
      changed_when: false
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Remove existing LXC host entries from inventory
      lineinfile:
        path: "{{ lxc_inventory_path }}"
        regexp: '^{{ item.hostname | regex_escape }}\s+'
        state: absent
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Persist LXC host entries to hosts
      lineinfile:
        path: "{{ lxc_inventory_path }}"
        insertafter: '^\[lxc_wordpress\]$'
        line: '{{ item.hostname }} ansible_host={{ item.ip }} ansible_user=root ansible_ssh_private_key_file={{ ansible_private_key_path }} lxc_ctid={{ item.ctid }} client_user={{ item.client_user }} client_pubkey_file={{ item.client_pubkey_path }}'
        state: present
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Wait for SSH port on containers
      wait_for:
        host: "{{ item.ip }}"
        port: 22
        timeout: 180
        sleep: 3
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
      delegate_to: localhost

    - name: Remove stale host key entries for container IPs
      command: "ssh-keygen -R {{ item.ip }}"
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
      delegate_to: localhost
      failed_when: false
      changed_when: false

    - name: Scan container host keys
      command: "ssh-keyscan -H -T 5 {{ item.ip }}"
      register: lxc_keyscan_results
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.hostname }}"
      delegate_to: localhost
      failed_when: false
      changed_when: false

    - name: Add to known_hosts
      known_hosts:
        path: /mnt/pve/cephfs/.ssh/known_hosts
        name: "{{ item.item.ip }}"
        key: "{{ item.stdout }}"
        state: present
      loop: "{{ lxc_keyscan_results.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      when: item.rc == 0 and (item.stdout | length > 0)
      delegate_to: localhost



      

  
